server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rwtogether?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:rwtogether}
    password: ${SPRING_DATASOURCE_PASSWORD:rwtogether123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:rwtogether-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 604800000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

api:
  bangumi:
    base-url: https://api.bgm.tv
  tmdb:
    base-url: ${TMDB_BASE_URL:https://api.themoviedb.org/3}
    api-key: ${TMDB_API_KEY:your-tmdb-api-key}
    image-base-url: ${TMDB_IMAGE_BASE_URL:https://image.tmdb.org/t/p/w500}
  google-books:
    base-url: https://www.googleapis.com/books/v1
