version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: rwtogether-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rwtogether
      MYSQL_USER: rwtogether
      MYSQL_PASSWORD: rwtogether123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
volumes:
  mysql-data:
