services:
  - type: web
    name: rwtogether-backend
    runtime: java
    buildCommand: cd backend && ./mvnw package -DskipTests
    startCommand: cd backend && java -Xms256m -Xmx512m -jar target/*.jar
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TMDB_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
